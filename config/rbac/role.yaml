---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - networking.zylu.dev
  resources:
  - xdpprograms
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.zylu.dev
  resources:
  - xdpprograms/finalizers
  verbs:
  - update
- apiGroups:
  - networking.zylu.dev
  resources:
  - xdpprograms/status
  verbs:
  - get
  - patch
  - update
