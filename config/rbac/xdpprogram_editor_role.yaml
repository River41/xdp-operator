# This rule is not used by the project xdp-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the networking.zylu.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: xdp-operator
    app.kubernetes.io/managed-by: kustomize
  name: xdpprogram-editor-role
rules:
- apiGroups:
  - networking.zylu.dev
  resources:
  - xdpprograms
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.zylu.dev
  resources:
  - xdpprograms/status
  verbs:
  - get
