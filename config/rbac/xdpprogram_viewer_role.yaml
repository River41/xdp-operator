# This rule is not used by the project xdp-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to networking.zylu.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: xdp-operator
    app.kubernetes.io/managed-by: kustomize
  name: xdpprogram-viewer-role
rules:
- apiGroups:
  - networking.zylu.dev
  resources:
  - xdpprograms
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.zylu.dev
  resources:
  - xdpprograms/status
  verbs:
  - get
